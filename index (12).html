<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oslo Street Film Route Planner</title>
<style>
  :root{
    --ink:#0d1117;
    --paper:#f0f0f0;
    --line:#1a1a2e;
    --steel:#2d6a4f;
    --steel-soft:rgba(45,106,79,0.22);
    --route:#e63946;
    --route-done:#2d6a4f;
    --start:#2fa84f;
    --amber:#f4a261;
    --muted:#8a8f92;
    --panel-bg:#161b22;
    --card-bg:#21262d;
    --border:rgba(255,255,255,0.1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--ink);color:var(--paper);}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ---- Toolbar ---- */
  #toolbar{
    background:var(--ink);
    padding:10px 12px 8px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:20;
    border-bottom:1px solid var(--border);
  }
  #title{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--amber);
    font-weight:600;
  }
  #title span{color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400;margin-left:8px;font-size:12px;}
  #buttons{display:flex;gap:6px;flex-wrap:wrap;}
  button.tool{
    flex:1 1 auto;
    min-width:74px;
    background:var(--card-bg);
    color:var(--paper);
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 6px;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  button.tool:active{transform:scale(0.96);}
  button.tool.active{background:var(--steel);border-color:var(--steel);}
  button.tool:disabled{opacity:0.35;cursor:not-allowed;}
  button.tool.danger{background:#3a1f1a;}
  #status{
    font-size:11.5px;
    color:var(--muted);
    min-height:15px;
    font-family:'SF Mono',ui-monospace,Menlo,monospace;
  }

  /* ---- Map ---- */
  #mapWrap{flex:1;position:relative;background:#e8e4df;overflow:hidden;touch-action:none;}
  svg{width:100%;height:100%;display:block;}
  #basePath{fill:none;stroke:var(--line);stroke-width:3;stroke-linecap:round;opacity:0.9;}
  #selPath{fill:none;stroke:var(--steel);stroke-width:4;stroke-linecap:round;opacity:0.95;}
  #dupPath{fill:none;stroke:var(--amber);stroke-width:3.5;stroke-linecap:round;stroke-dasharray:8,4;opacity:0.9;}
  #routePath{fill:none;stroke:var(--route);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;}
  #routePathDone{fill:none;stroke:var(--route-done);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;}
  #selPaint{fill:var(--steel-soft);stroke:var(--steel);stroke-width:2;stroke-dasharray:4,3;pointer-events:none;opacity:0.7;}
  #startMarker{fill:var(--start);stroke:#0c3a19;stroke-width:2;display:none;}
  #playMarker{fill:var(--route);stroke:#fff;stroke-width:2;display:none;}
  #paintCursor{fill:var(--steel);opacity:0.35;pointer-events:none;display:none;}

  #hint{
    position:absolute;left:10px;bottom:10px;
    background:rgba(13,17,23,0.92);color:var(--paper);
    padding:8px 11px;border-radius:8px;font-size:12px;line-height:1.4;
    max-width:70%;pointer-events:none;
  }

  /* ---- Brush Size ---- */
  #brushSizeWrap{
    position:absolute;top:10px;right:10px;
    background:rgba(13,17,23,0.92);padding:8px 12px;
    border-radius:8px;display:none;align-items:center;gap:8px;
    z-index:25;
  }
  #brushSizeWrap.visible{display:flex;}
  #brushSizeWrap label{font-size:11px;color:var(--muted);}
  #brushSizeSlider{width:80px;}
  #brushSizeVal{font-size:11px;color:var(--paper);font-family:monospace;}

  /* ---- Results panel ---- */
  #panel{
    background:var(--ink);
    border-top:1px solid var(--border);
    padding:0 14px;
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease, padding .25s ease;
    z-index:20;
  }
  #panel.open{max-height:280px;padding:12px 14px 14px;}
  #stats{
    display:flex;
    gap:14px;
    font-family:'SF Mono',ui-monospace,Menlo,monospace;
    font-size:12px;
    color:var(--paper);
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  #stats div b{display:block;color:var(--amber);font-size:16px;font-weight:700;}
  #stats div span{color:var(--muted);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;}
  #playRow{display:flex;align-items:center;gap:10px;}
  #playBtn{
    background:var(--route);color:#fff;border:none;border-radius:50%;
    width:42px;height:42px;font-size:16px;cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;
  }
  #progressWrap{flex:1;height:6px;background:rgba(255,255,255,0.12);border-radius:4px;overflow:hidden;}
  #progressBar{height:100%;width:0%;background:var(--route);}
  #speedLabel{font-size:11px;color:var(--muted);white-space:nowrap;font-family:'SF Mono',ui-monospace,Menlo,monospace;}
  input[type=range]{width:70px;}

  /* ---- Instructions Panel ---- */
  #instructionsPanel{
    position:absolute;right:10px;top:60px;
    background:rgba(13,17,23,0.96);color:var(--paper);
    border-radius:12px;width:320px;max-height:70%;
    display:none;flex-direction:column;
    border:1px solid var(--border);
    z-index:30;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
  }
  #instructionsPanel.visible{display:flex;}
  #instructionsHeader{
    padding:12px 14px;border-bottom:1px solid var(--border);
    font-weight:600;font-size:13px;display:flex;
    justify-content:space-between;align-items:center;
  }
  #instructionsHeader button{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;
  }
  #instructionsList{
    overflow-y:auto;flex:1;padding:8px;
    max-height:400px;
  }
  .instruction-step{
    padding:10px 12px;margin:4px 0;
    background:var(--card-bg);border-radius:8px;
    cursor:pointer;transition:background .15s;
    border-left:3px solid transparent;
  }
  .instruction-step:hover{background:rgba(255,255,255,0.05);}
  .instruction-step.active{border-left-color:var(--route);background:rgba(230,57,70,0.1);}
  .instruction-step.done{border-left-color:var(--route-done);opacity:0.6;}
  .instruction-step .step-num{
    font-size:10px;color:var(--muted);font-family:monospace;
    margin-bottom:2px;
  }
  .instruction-step .step-text{font-size:12px;line-height:1.4;}
  .instruction-step .step-dist{
    font-size:10px;color:var(--amber);font-family:monospace;margin-top:2px;
  }

  /* ---- Export/Import ---- */
  #exportImportRow{
    display:flex;gap:8px;padding:10px 12px;
    border-top:1px solid var(--border);
  }
  .file-btn{
    background:var(--card-bg);color:var(--paper);
    border:1px solid var(--border);border-radius:6px;
    padding:6px 10px;font-size:11px;cursor:pointer;
    flex:1;text-align:center;
  }
  .file-btn:hover{background:rgba(255,255,255,0.05);}

  /* ---- Turn indicator ---- */
  #turnIndicator{
    position:absolute;right:12px;bottom:12px;
    background:rgba(13,17,23,0.92);color:var(--paper);
    padding:10px 14px;border-radius:12px;
    font-size:14px;font-weight:600;
    display:none;z-index:40;text-align:center;
    border:1.5px solid var(--route);
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
    max-width:140px;
  }
  #turnIndicator .turn-arrow{font-size:22px;margin-bottom:4px;}
  #turnIndicator .turn-text{font-size:11px;color:var(--muted);}

  /* ---- Mobile optimizations ---- */
  @media (max-width:600px){
    #instructionsPanel{width:calc(100% - 20px);max-height:55%;top:auto;bottom:10px;right:10px;}
    #stats{gap:8px;}
    #stats div b{font-size:14px;}
    button.tool{font-size:11px;min-width:55px;padding:8px 4px;}
    #basePath{stroke-width:3.5;}
    #selPath{stroke-width:4.5;}
    #dupPath{stroke-width:4;}
    #routePath{stroke-width:6;}
    #hint{font-size:11px;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div id="title">OSLO STREET FILM ROUTE <span>smart mapping vehicle algorithm</span></div>
    <div id="buttons">
      <button class="tool active" id="btnPan">Pan / Zoom</button>
      <button class="tool" id="btnArea">🖌️ Paint Area</button>
      <button class="tool" id="btnStart" disabled>Set Start</button>
      <button class="tool" id="btnRun" disabled>Run</button>
      <button class="tool" id="btnInstructions" disabled>📋 Steps</button>
      <button class="tool danger" id="btnReset">Reset</button>
    </div>
    <div id="status">Loading street data…</div>
  </div>

  <div id="mapWrap">
    <svg id="map" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <path id="basePath" d=""></path>
      <path id="selPath" d=""></path>
      <path id="dupPath" d=""></path>
      <path id="routePathDone" d=""></path>
      <path id="routePath" d=""></path>
      <path id="selPaint" d=""></path>
      <circle id="startMarker" r="7"></circle>
      <circle id="playMarker" r="8"></circle>
      <circle id="paintCursor" r="10"></circle>
      <circle id="locMarker" r="5" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5" style="display:none;"></circle>
    </svg>
    <div id="hint">Paint an area with your brush, set start point, then run the smart route.</div>
    <div id="brushSizeWrap">
      <label>🖌️</label>
      <input type="range" id="brushSizeSlider" min="20" max="100" value="40">
      <span id="brushSizeVal">40m</span>
    </div>
    <div id="turnIndicator">
      <div class="turn-arrow" id="turnArrow">➡️</div>
      <div id="turnText">Continue</div>
      <div class="turn-text" id="turnDist">200m</div>
    </div>
  </div>

  <div id="instructionsPanel">
    <div id="instructionsHeader">
      <span>📍 Route Instructions</span>
      <button id="closeInstructions">✕</button>
    </div>
    <div id="instructionsList"></div>
    <div id="exportImportRow">
      <button class="file-btn" id="btnExport">💾 Export</button>
      <button class="file-btn" id="btnImport">📂 Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
  </div>

  <div id="panel">
    <div id="stats">
      <div><b id="statSteps">–</b><span>steps</span></div>
      <div><b id="statDist">–</b><span>route km</span></div>
      <div><b id="statStreets">–</b><span>street km</span></div>
      <div><b id="statOverhead">–</b><span>overhead</span></div>
      <div><b id="statTurns">–</b><span>turns</span></div>
      <div><b id="statUTurns">–</b><span>u-turns</span></div>
      <div><b id="statSmooth">–</b><span>smooth %</span></div>
    </div>
    <div id="playRow">
      <button id="playBtn">▶</button>
      <div id="progressWrap"><div id="progressBar"></div></div>
      <span id="speedLabel">speed</span>
      <input type="range" id="speedSlider" min="1" max="10" value="5">
      <button class="file-btn" id="btnExportPanel" style="margin-left:8px;">💾 Export</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ================= Config =================
  const DATA_URL = 'https://haidara-alt.github.io/Data-file/oslo_data.json';
  // Turn analysis constants (for display only, not routing)
  const SHARP_TURN_THRESHOLD = 60;
  const U_TURN_THRESHOLD = 150;


  // ================= State =================
  let nodes = [], edges = [];
  let statusEl = document.getElementById('status');
  let selection = null;
  let startNode = null;
  let currentCircuit = null;
  let routeResult = null;
  let instructions = data.instructions || [];
  let currentStepIndex = 0;
  let isPlaying = false;
  let paintedNodes = new Set();

  // ================= Load data =================
  async function loadData(){
    // Try localStorage cache first
    const cached = localStorage.getItem('oslo_data_cache');
    if (cached){
      try {
        const raw = JSON.parse(cached);
        nodes = raw.nodes;
        edges = raw.edges;
        initProjection();
        drawBaseMap();
        statusEl.textContent = `Loaded ${nodes.length} intersections, ${edges.length} street segments (from cache). Paint an area to begin.`;
        return;
      } catch(e){ localStorage.removeItem('oslo_data_cache'); }
    }
    try {
      const res = await fetch(DATA_URL, {cache: 'no-store'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.json();
      nodes = raw.nodes;
      edges = raw.edges;
      initProjection();
      drawBaseMap();
      statusEl.textContent = `Loaded ${nodes.length} intersections, ${edges.length} street segments. Paint an area to begin.`;
      // Cache for offline use
      try { localStorage.setItem('oslo_data_cache', JSON.stringify({nodes, edges})); } catch(e){}
    } catch (e) {
      statusEl.innerHTML = '<span style="color:#e63946">Failed to load oslo_data.json from GitHub.</span> Upload it manually below.';
      showDataUpload();
      console.error(e);
    }
  }

  function showDataUpload(){
    // Create a file input for manual data upload
    const existing = document.getElementById('dataUploadWrap');
    if (existing) return;
    const wrap = document.createElement('div');
    wrap.id = 'dataUploadWrap';
    wrap.innerHTML = '<input type="file" id="dataFile" accept=".json" style="display:none"><button class="tool" id="btnUploadData" style="margin-top:6px;width:100%">📂 Upload oslo_data.json</button>';
    document.getElementById('toolbar').appendChild(wrap);
    document.getElementById('btnUploadData').onclick = () => document.getElementById('dataFile').click();
    document.getElementById('dataFile').onchange = function(e){
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev){
        try {
          const raw = JSON.parse(ev.target.result);
          nodes = raw.nodes;
          edges = raw.edges;
          initProjection();
          drawBaseMap();
          statusEl.textContent = `Loaded ${nodes.length} intersections, ${edges.length} street segments. Paint an area to begin.`;
      // Cache for offline use
      try { localStorage.setItem('oslo_data_cache', JSON.stringify({nodes, edges})); } catch(e){}
          wrap.remove();
        } catch (err){
          statusEl.textContent = 'Invalid JSON file. Make sure it is oslo_data.json.';
        }
      };
      reader.readAsText(file);
    };
  }

  // ================= Projection =================
  let lonMin, lonMax, latMin, latMax, latMid, cosLat, SCALE, worldW, worldH;
  let projected;

  function initProjection(){
    lonMin=Infinity; lonMax=-Infinity; latMin=Infinity; latMax=-Infinity;
    for (const n of nodes){
      if(n[0]<lonMin) lonMin=n[0];
      if(n[0]>lonMax) lonMax=n[0];
      if(n[1]<latMin) latMin=n[1];
      if(n[1]>latMax) latMax=n[1];
    }
    latMid = (latMin+latMax)/2;
    cosLat = Math.cos(latMid*Math.PI/180);
    SCALE = 100000;
    projected = new Float64Array(nodes.length*2);
    for (let i=0;i<nodes.length;i++){
      const p = proj(nodes[i][0], nodes[i][1]);
      projected[i*2]=p[0]; projected[i*2+1]=p[1];
    }
    worldW = (lonMax-lonMin)*cosLat*SCALE;
    worldH = (latMax-latMin)*SCALE;
  }

  function proj(lon,lat){
    return [ (lon-lonMin)*cosLat*SCALE, (latMax-lat)*SCALE ];
  }
  function px(i){ return projected[i*2]; }
  function py(i){ return projected[i*2+1]; }
  function unproj(x,y){
    return [ x/(cosLat*SCALE) + lonMin, latMax - y/SCALE ];
  }

  // ================= Base map path =================
  const svg = document.getElementById('map');
  const basePathEl = document.getElementById('basePath');

  function drawBaseMap(){
    let d = '';
    for (const e of edges){
      const [u,v,len,mid] = e;
      d += 'M'+px(u).toFixed(1)+','+py(u).toFixed(1)+' ';
      if (mid && mid.length){
        for (const m of mid){
          const p = proj(m[0], m[1]);
          d += 'L'+p[0].toFixed(1)+','+p[1].toFixed(1)+' ';
        }
      }
      d += 'L'+px(v).toFixed(1)+','+py(v).toFixed(1)+' ';
    }
    basePathEl.setAttribute('d', d);
  }

  // ================= ViewBox / pan / zoom =================
  const pad = Math.max(worldW||100, worldH||100)*0.03;
  let vb = { x:-pad||-5, y:-pad||-5, w:(worldW+2*pad)||100, h:(worldH+2*pad)||100 };

  function applyVB(){
    svg.setAttribute('viewBox', vb.x+' '+vb.y+' '+vb.w+' '+vb.h);
  }
  applyVB();

  function clientToSVG(clientX, clientY){
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const ctm = svg.getScreenCTM().inverse();
    const p = pt.matrixTransform(ctm);
    return {x:p.x, y:p.y};
  }

  // ================= Mode & UI =================
  let mode = 'pan';
  const btnPan = document.getElementById('btnPan');
  const btnArea = document.getElementById('btnArea');
  const btnStart = document.getElementById('btnStart');
  const btnRun = document.getElementById('btnRun');
  const btnReset = document.getElementById('btnReset');
  const btnInstructions = document.getElementById('btnInstructions');
  const hint = document.getElementById('hint');
  const brushSizeWrap = document.getElementById('brushSizeWrap');
  const brushSizeSlider = document.getElementById('brushSizeSlider');
  const brushSizeVal = document.getElementById('brushSizeVal');
  const paintCursor = document.getElementById('paintCursor');

  function setMode(m){
    mode = m;
    [btnPan,btnArea,btnStart].forEach(b=>b.classList.remove('active'));
    if(m==='pan') btnPan.classList.add('active');
    if(m==='area') btnArea.classList.add('active');
    if(m==='start') btnStart.classList.add('active');
    if(m==='pan'){ hint.textContent = 'Drag to pan, scroll/pinch to zoom.'; brushSizeWrap.classList.remove('visible'); paintCursor.style.display='none'; }
    if(m==='area'){ hint.textContent = 'Paint over the streets you want to film. Adjust brush size.'; brushSizeWrap.classList.add('visible'); paintCursor.style.display='block'; }
    if(m==='start'){ hint.textContent = 'Tap the street corner you want to start (and end) at.'; brushSizeWrap.classList.remove('visible'); paintCursor.style.display='none'; }
  }
  btnPan.onclick = ()=>setMode('pan');
  btnArea.onclick = ()=>setMode('area');
  btnStart.onclick = ()=>{ if(!btnStart.disabled) setMode('start'); };

  brushSizeSlider.oninput = function(){
    brushSizeVal.textContent = this.value + 'm';
    const r = getBrushRadiusSVG();
    paintCursor.setAttribute('r', r);
  };

  function getBrushRadiusSVG(){
    return parseFloat(brushSizeSlider.value) * SCALE / 100000 * 0.9;
  }

  // ---- wheel zoom ----
  document.getElementById('mapWrap').addEventListener('wheel', function(e){
    e.preventDefault();
    const p = clientToSVG(e.clientX, e.clientY);
    const factor = e.deltaY < 0 ? 0.88 : 1.14;
    const newW = vb.w*factor, newH = vb.h*factor;
    vb.x = p.x - (p.x - vb.x)*factor;
    vb.y = p.y - (p.y - vb.y)*factor;
    vb.w = newW; vb.h = newH;
    applyVB();
  }, {passive:false});

  // ---- Paint Area Selection ----
  let isPainting = false;
  const selPaintEl = document.getElementById('selPaint');
  const selPathEl = document.getElementById('selPath');

  function paintAt(svgX, svgY){
    const r = getBrushRadiusSVG();
    paintCursor.setAttribute('cx', svgX);
    paintCursor.setAttribute('cy', svgY);
    paintCursor.setAttribute('r', r);

    let changed = false;
    // Only check nodes within reasonable distance for performance
    for (let i=0;i<nodes.length;i++){
      const dx = px(i)-svgX, dy = py(i)-svgY;
      if (dx*dx + dy*dy <= r*r){
        if (!paintedNodes.has(i)){
          paintedNodes.add(i);
          changed = true;
        }
      }
    }
    if (changed) updatePaintDisplay();
    return changed;
  }

  function updatePaintDisplay(){
    // Draw painted area as circles at each painted node
    let d = '';
    const r = getBrushRadiusSVG();
    for (const n of paintedNodes){
      const cx = px(n), cy = py(n);
      d += `M${(cx+r).toFixed(1)},${cy.toFixed(1)} A${r.toFixed(1)},${r.toFixed(1)} 0 1,0 ${(cx-r).toFixed(1)},${cy.toFixed(1)} A${r.toFixed(1)},${r.toFixed(1)} 0 1,0 ${(cx+r).toFixed(1)},${cy.toFixed(1)} `;
    }
    selPaintEl.setAttribute('d', d);

    // Highlight selected edges
    let edgeD = '';
    const edgeSet = new Set();
    for (const e of edges){
      if (paintedNodes.has(e[0]) && paintedNodes.has(e[1])){
        const key = e[0] < e[1] ? e[0]+'_'+e[1] : e[1]+'_'+e[0];
        if (!edgeSet.has(key)){
          edgeSet.add(key);
          edgeD += 'M'+px(e[0]).toFixed(1)+','+py(e[0]).toFixed(1)+' L'+px(e[1]).toFixed(1)+','+py(e[1]).toFixed(1)+' ';
        }
      }
    }
    selPathEl.setAttribute('d', edgeD);
  }

  let dragging=false, dragStartClient=null, dragStartVB=null;

  svg.addEventListener('pointerdown', function(e){
    if (mode === 'area'){
      isPainting = true;
      const p = clientToSVG(e.clientX, e.clientY);
      paintAt(p.x, p.y);
      svg.setPointerCapture(e.pointerId);
    } else if (mode === 'pan'){
      dragging = true;
      dragStartClient = {x:e.clientX, y:e.clientY};
      dragStartVB = {...vb};
      svg.setPointerCapture(e.pointerId);
    }
  });

  svg.addEventListener('pointermove', function(e){
    if (mode === 'area' && isPainting){
      const p = clientToSVG(e.clientX, e.clientY);
      paintAt(p.x, p.y);
    } else if (mode === 'pan' && dragging){
      const rect = svg.getBoundingClientRect();
      const scale = dragStartVB.w / rect.width;
      const dx = (e.clientX - dragStartClient.x) * scale;
      const dy = (e.clientY - dragStartClient.y) * scale;
      vb.x = dragStartVB.x - dx;
      vb.y = dragStartVB.y - dy;
      applyVB();
    } else if (mode === 'area'){
      const p = clientToSVG(e.clientX, e.clientY);
      paintCursor.setAttribute('cx', p.x);
      paintCursor.setAttribute('cy', p.y);
      paintCursor.setAttribute('r', getBrushRadiusSVG());
    }
  });

  svg.addEventListener('pointerup', function(e){
    if (mode === 'area' && isPainting){
      isPainting = false;
      finalizePaintSelection();
    } else if (mode === 'pan'){
      dragging = false;
    } else if (mode === 'start'){
      const p = clientToSVG(e.clientX, e.clientY);
      pickStartNode(p.x, p.y);
    }
  });

  // ---- pinch zoom ----
  let pinchStartDist=null, pinchStartVB=null, pinchMid=null;
  document.getElementById('mapWrap').addEventListener('touchstart', function(e){
    if (e.touches.length===2){
      const [a,b] = e.touches;
      pinchStartDist = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
      pinchStartVB = {...vb};
      pinchMid = clientToSVG((a.clientX+b.clientX)/2, (a.clientY+b.clientY)/2);
      dragging = false; isPainting = false;
    }
  }, {passive:true});
  document.getElementById('mapWrap').addEventListener('touchmove', function(e){
    if (e.touches.length===2 && pinchStartDist){
      e.preventDefault();
      const [a,b] = e.touches;
      const dist = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
      const factor = pinchStartDist / dist;
      vb.w = pinchStartVB.w * factor;
      vb.h = pinchStartVB.h * factor;
      vb.x = pinchMid.x - (pinchMid.x - pinchStartVB.x) * factor;
      vb.y = pinchMid.y - (pinchMid.y - pinchStartVB.y) * factor;
      applyVB();
    }
  }, {passive:false});
  document.getElementById('mapWrap').addEventListener('touchend', function(e){
    if (e.touches.length<2) pinchStartDist=null;
  });

  // ================= Finalize Paint Selection =================
  function finalizePaintSelection(){
    if (paintedNodes.size < 3){
      statusEl.textContent = 'Painted area too small. Paint more streets.';
      return;
    }

    const nodeSet = new Set(paintedNodes);
    const edgeList = [];
    for (const e of edges){
      if (nodeSet.has(e[0]) && nodeSet.has(e[1])) edgeList.push(e);
    }

    let bLonMin=Infinity, bLonMax=-Infinity, bLatMin=Infinity, bLatMax=-Infinity;
    for (const i of nodeSet){
      const [lon,lat] = nodes[i];
      bLonMin=Math.min(bLonMin,lon); bLonMax=Math.max(bLonMax,lon);
      bLatMin=Math.min(bLatMin,lat); bLatMax=Math.max(bLatMax,lat);
    }

    selection = {bbox:{lonMin:bLonMin,lonMax:bLonMax,latMin:bLatMin,latMax:bLatMax}, nodeSet, edgeList};
    statusEl.textContent = `Selected ${nodeSet.size} intersections, ${edgeList.length} segments. Set a start point.`;
    btnStart.disabled = false;
    resetRun();
    setMode('start');
  }

  // ================= Start point =================
  let startMarkerEl = document.getElementById('startMarker');

  function pickStartNode(x,y){
    if (!selection) return;
    let best=null, bestD=Infinity;
    for (const i of selection.nodeSet){
      const dx = px(i)-x, dy = py(i)-y;
      const d = dx*dx+dy*dy;
      if (d<bestD){bestD=d; best=i;}
    }
    if (best===null) return;
    startNode = best;
    startMarkerEl.setAttribute('cx', px(best));
    startMarkerEl.setAttribute('cy', py(best));
    startMarkerEl.style.display = 'block';
    statusEl.textContent = 'Start point set. Ready to compute smart route.';
    btnRun.disabled = false;
  }

  // ================= Reset =================
  function resetRun(){
    document.getElementById('dupPath').setAttribute('d','');
    document.getElementById('routePath').setAttribute('d','');
    document.getElementById('routePathDone').setAttribute('d','');
    document.getElementById('playMarker').style.display='none';
    document.getElementById('locMarker').style.display='none';
    document.getElementById('panel').classList.remove('open');
    document.getElementById('instructionsPanel').classList.remove('visible');
    pauseAnim();
    currentCircuit = null;
    routeResult = null;
    instructions = data.instructions || [];
    currentStepIndex = 0;
    btnInstructions.disabled = true;
    btnRun.disabled = !(selection && startNode!==null);
  }
  btnReset.onclick = function(){
    selection = null; startNode = null; paintedNodes = new Set();
    selPathEl.setAttribute('d','');
    selPaintEl.setAttribute('d','');
    startMarkerEl.style.display='none';
    btnStart.disabled = true; btnRun.disabled = true;
    statusEl.textContent = 'Cleared. Paint a new area to begin.';
    resetRun();
    setMode('area');
  };

  // ================= Route Algorithm Worker (Distance Only) =================
  const workerCode = `
    class MinHeap{
      constructor(){this.arr=[];}
      push(item){this.arr.push(item);let i=this.arr.length-1;while(i>0){const p=(i-1)>>1;if(this.arr[p][0]<=this.arr[i][0])break;[this.arr[p],this.arr[i]]=[this.arr[i],this.arr[p]];i=p;}}
      pop(){const top=this.arr[0];const last=this.arr.pop();if(this.arr.length>0){this.arr[0]=last;let i=0;while(true){let l=2*i+1,r=2*i+2,s=i;if(l<this.arr.length&&this.arr[l][0]<this.arr[s][0])s=l;if(r<this.arr.length&&this.arr[r][0]<this.arr[s][0])s=r;if(s===i)break;[this.arr[s],this.arr[i]]=[this.arr[i],this.arr[s]];i=s;}}return top;}
      get size(){return this.arr.length;}
    }
    function buildAdj(n,edgeList){
      const adj=Array.from({length:n},()=>[]);
      edgeList.forEach((e)=>{const [u,v,length]=e;adj[u].push({to:v,length});adj[v].push({to:u,length});});
      return adj;
    }
    function dijkstra(adj,source,validSet){
      const dist=new Map(), prevNode=new Map();
      dist.set(source,0);
      const heap=new MinHeap();
      heap.push([0,source]);
      const visited=new Set();
      while(heap.size>0){
        const [d,u]=heap.pop();
        if(visited.has(u))continue;
        visited.add(u);
        for(const {to,length} of adj[u]){
          if(validSet&&!validSet.has(to))continue;
          const nd=d+length;
          if(!dist.has(to)||nd<dist.get(to)){
            dist.set(to,nd); prevNode.set(to,u);
            heap.push([nd,to]);
          }
        }
      }
      return {dist,prevNode};
    }
    function reconstructPath(prevNode,source,target){
      const path=[target]; let cur=target;
      while(cur!==source){ cur=prevNode.get(cur); path.push(cur); }
      path.reverse(); return path;
    }
    function greedyMatch(oddNodes,adj,validSet){
      const remaining=new Set(oddNodes);
      const pairs=[];
      while(remaining.size>0){
        const m=remaining.values().next().value;
        remaining.delete(m);
        const {dist,prevNode}=dijkstra(adj,m,validSet);
        let bestN=null,bestD=Infinity;
        for(const n of remaining){
          const d=dist.has(n)?dist.get(n):Infinity;
          if(d<bestD){bestD=d;bestN=n;}
        }
        if(bestN===null)continue;
        remaining.delete(bestN);
        pairs.push(reconstructPath(prevNode,m,bestN));
      }
      return pairs;
    }
    function hierholzer(nodeCount,multiEdges,start){
      const adj=Array.from({length:nodeCount},()=>[]);
      multiEdges.forEach((e,idx)=>{
        const [u,v]=e;
        adj[u].push({to:v,id:idx});
        adj[v].push({to:u,id:idx});
      });
      const used=new Array(multiEdges.length).fill(false);
      const ptr=new Array(nodeCount).fill(0);
      const stack=[start]; const circuit=[];
      while(stack.length>0){
        const v=stack[stack.length-1];
        let advanced=false;
        while(ptr[v]<adj[v].length){
          const {to,id}=adj[v][ptr[v]]; ptr[v]++;
          if(used[id])continue;
          used[id]=true; stack.push(to); advanced=true; break;
        }
        if(!advanced) circuit.push(stack.pop());
      }
      circuit.reverse();
      return circuit;
    }
    function largestComponent(nodesSet,adj,mustInclude){
      const visited=new Set();
      let best=null;
      for(const s of nodesSet){
        if(visited.has(s))continue;
        const comp=[]; const stack=[s]; visited.add(s);
        while(stack.length){
          const u=stack.pop(); comp.push(u);
          for(const {to} of adj[u]) if(nodesSet.has(to)&&!visited.has(to)){visited.add(to);stack.push(to);}
        }
        const compSet=new Set(comp);
        if(mustInclude!==undefined){
          if(compSet.has(mustInclude)) return compSet;
        } else if(!best||comp.length>best.length){ best=comp; }
      }
      return best?new Set(best):new Set();
    }

    function analyzeRoute(circuit, edgeMap, px, py){
      let uTurns = 0, sharpTurns = 0, smoothSegments = 0;
      let totalAngle = 0, angleCount = 0;
      const stepInstructions = [];

      for (let i=0; i<circuit.length-2; i++){
        const n1 = circuit[i], n2 = circuit[i+1], n3 = circuit[i+2];
        const a1 = Math.atan2(py(n2)-py(n1), px(n2)-px(n1));
        const a2 = Math.atan2(py(n3)-py(n2), px(n3)-px(n2));
        let diff = Math.abs((a2 - a1) * 180 / Math.PI);
        if (diff > 180) diff = 360 - diff;

        totalAngle += diff;
        angleCount++;

        if (diff > U_TURN_THRESHOLD) uTurns++;
        else if (diff > SHARP_TURN_THRESHOLD) sharpTurns++;
        else if (diff < 20) smoothSegments++;

        let dir = 'Continue straight';
        if (diff > U_TURN_THRESHOLD) dir = 'Make U-turn';
        else if (diff > 120) dir = 'Sharp turn';
        else if (diff > 60) dir = 'Turn';
        else if (diff > 20) dir = 'Slight turn';

        const edgeLen = edgeMap.get(Math.min(n2,n3)+'_'+Math.max(n2,n3)) || 0;
        stepInstructions.push({
          from: n1, via: n2, to: n3,
          direction: dir,
          angle: Math.round(diff),
          distance: Math.round(edgeLen)
        });
      }

      return {
        turns: sharpTurns,
        uTurns: uTurns,
        sharpTurns: sharpTurns,
        smoothScore: angleCount > 0 ? Math.round(smoothSegments / angleCount * 100) : 100,
        avgAngle: angleCount > 0 ? Math.round(totalAngle / angleCount) : 0,
        instructions: stepInstructions
      };
    }

    self.onmessage = function(e){
      const {nodeCount, edgeList, startNode, projected} = e.data;
      const nodeSet = new Set();
      edgeList.forEach(ed=>{nodeSet.add(ed[0]); nodeSet.add(ed[1]);});

      const adjFull = buildAdj(nodeCount, edgeList);
      const compNodes = largestComponent(nodeSet, adjFull, startNode);
      if (!compNodes.has(startNode)){
        self.postMessage({error:'Start point is isolated from the selected streets. Pick another point.'});
        return;
      }
      const compEdges = edgeList.filter(ed=>compNodes.has(ed[0])&&compNodes.has(ed[1]));

      const degree = new Map();
      compEdges.forEach(ed=>{
        degree.set(ed[0],(degree.get(ed[0])||0)+1);
        degree.set(ed[1],(degree.get(ed[1])||0)+1);
      });
      let oddNodes = [...compNodes].filter(n=>(degree.get(n)||0)%2===1);

      const adjComp = buildAdj(nodeCount, compEdges);

      let matchPool = oddNodes;
      if ((degree.get(startNode)||0)%2===1){
        matchPool = oddNodes.filter(n=>n!==startNode);
      }
      const pairs = greedyMatch(matchPool, adjComp, compNodes);

      const multiEdges = compEdges.map(ed=>[ed[0],ed[1],ed[2]]);
      const lenMap = new Map();
      compEdges.forEach(ed=>{
        lenMap.set(ed[0]+'_'+ed[1], ed[2]);
        lenMap.set(ed[1]+'_'+ed[0], ed[2]);
      });
      let addedLength=0;
      const dupSet = new Set();
      pairs.forEach(path=>{
        for(let i=0;i<path.length-1;i++){
          const a=path[i], b=path[i+1];
          const len=lenMap.get(a+'_'+b);
          multiEdges.push([a,b,len]);
          addedLength+=len;
          dupSet.add(Math.min(a,b)+'_'+Math.max(a,b));
        }
      });

      const totalStreets = compEdges.reduce((s,ed)=>s+ed[2],0);
      const totalRoute = multiEdges.reduce((s,ed)=>s+ed[2],0);

      const circuit = hierholzer(nodeCount, multiEdges, startNode);

      const px = (i) => projected[i*2];
      const py = (i) => projected[i*2+1];
      const edgeMap = new Map();
      compEdges.forEach(ed=>{
        edgeMap.set(Math.min(ed[0],ed[1])+'_'+Math.max(ed[0],ed[1]), ed[2]);
      });
      const analysis = analyzeRoute(circuit, edgeMap, px, py);

      self.postMessage({
        circuit, totalStreets, totalRoute, addedLength,
        stepCount: circuit.length-1,
        dupEdges: [...dupSet],
        turns: analysis.turns + analysis.sharpTurns,
        uTurns: analysis.uTurns,
        sharpTurns: analysis.sharpTurns,
        smoothScore: analysis.smoothScore,
        avgAngle: analysis.avgAngle,
        instructions: analysis.instructions
      });
    };
  `;
  const workerBlob = new Blob([workerCode], {type:'application/javascript'});
  const worker = new Worker(URL.createObjectURL(workerBlob));

  btnRun.onclick = function(){
    if (!selection || startNode===null) return;
    statusEl.textContent = 'Computing shortest route…';
    btnRun.disabled = true;
    worker.postMessage({
      nodeCount: nodes.length,
      edgeList: selection.edgeList,
      startNode: startNode,
      projected: Array.from(projected)
    });
  };

  worker.onmessage = function(e){
    btnRun.disabled = false;
    const res = e.data;
    if (res.error){
      statusEl.textContent = res.error;
      return;
    }
    statusEl.textContent = `Route ready! ${res.turns||0} turns, ${res.uTurns||0} u-turns, ${res.smoothScore||0}% smooth.`;
    routeResult = res;
    showResult(res);
  };

  // ================= Show result =================
  function showResult(res){
    currentCircuit = res.circuit;
    instructions = res.instructions || [];

    // draw duplicated edges
    const dupSet = new Set(res.dupEdges);
    let dd = '';
    for (const e of selection.edgeList){
      const key = Math.min(e[0],e[1])+'_'+Math.max(e[0],e[1]);
      if (dupSet.has(key)){
        dd += 'M'+px(e[0]).toFixed(1)+','+py(e[0]).toFixed(1)+' L'+px(e[1]).toFixed(1)+','+py(e[1]).toFixed(1)+' ';
      }
    }
    document.getElementById('dupPath').setAttribute('d', dd);

    // build route path
    let rd = 'M'+px(currentCircuit[0]).toFixed(1)+','+py(currentCircuit[0]).toFixed(1)+' ';
    for (let i=1;i<currentCircuit.length;i++){
      rd += 'L'+px(currentCircuit[i]).toFixed(1)+','+py(currentCircuit[i]).toFixed(1)+' ';
    }
    const routeEl = document.getElementById('routePath');
    routeEl.setAttribute('d', rd);

    document.getElementById('statSteps').textContent = res.stepCount;
    document.getElementById('statDist').textContent = (res.totalRoute/1000).toFixed(2);
    document.getElementById('statStreets').textContent = (res.totalStreets/1000).toFixed(2);
    document.getElementById('statOverhead').textContent = (res.addedLength/res.totalStreets*100).toFixed(0)+'%';
    document.getElementById('statTurns').textContent = res.turns || 0;
    document.getElementById('statUTurns').textContent = res.uTurns || 0;
    document.getElementById('statSmooth').textContent = (res.smoothScore || 0)+'%';
    document.getElementById('panel').classList.add('open');

    btnInstructions.disabled = false;
    buildInstructionsList();
    setupAnim(routeEl);
  }

  // ================= Instructions Panel =================
  const instructionsPanel = document.getElementById('instructionsPanel');
  const instructionsList = document.getElementById('instructionsList');
  const closeInstructionsBtn = document.getElementById('closeInstructions');

  btnInstructions.onclick = function(){
    instructionsPanel.classList.toggle('visible');
  };
  closeInstructionsBtn.onclick = function(){
    instructionsPanel.classList.remove('visible');
  };

  function buildInstructionsList(){
    instructionsList.innerHTML = '';
    instructions.forEach((inst, idx) => {
      const div = document.createElement('div');
      div.className = 'instruction-step';
      div.dataset.index = idx;
      let arrow = '⬆️';
      if (inst.angle > 150) arrow = '↩️';
      else if (inst.angle > 120) arrow = '↪️';
      else if (inst.angle > 60) arrow = '➡️';
      else if (inst.angle > 20) arrow = '↗️';
      div.innerHTML = `
        <div class="step-num">Step ${idx + 1} ${arrow}</div>
        <div class="step-text">${inst.direction}</div>
        <div class="step-dist">${inst.distance}m · ${inst.angle}°</div>
      `;
      div.onclick = () => jumpToStep(idx);
      instructionsList.appendChild(div);
    });
  }

  function updateInstructionHighlight(){
    const steps = instructionsList.querySelectorAll('.instruction-step');
    steps.forEach((s, i) => {
      s.classList.remove('active', 'done');
      if (i < currentStepIndex) s.classList.add('done');
      else if (i === currentStepIndex) s.classList.add('active');
    });
    const active = instructionsList.querySelector('.instruction-step.active');
    if (active) active.scrollIntoView({behavior:'smooth', block:'center'});
  }

  function jumpToStep(idx){
    if (!currentCircuit || idx < 0 || idx >= currentCircuit.length - 1) return;
    currentStepIndex = idx;
    // Calculate progress based on step index
    const totalSteps = currentCircuit.length - 1;
    const progress = idx / totalSteps;
    animElapsed = progress * animLen * 1000 / speedKmPerSec() / 1000;
    animStart = null;
    updateRouteDisplay();
    updateInstructionHighlight();
    if (instructions[idx]){
      showTurnIndicator(instructions[idx]);
    }
  }

  function showTurnIndicator(inst){
    const indicator = document.getElementById('turnIndicator');
    const arrow = document.getElementById('turnArrow');
    const text = document.getElementById('turnText');
    const dist = document.getElementById('turnDist');

    if (inst.angle > U_TURN_THRESHOLD) arrow.textContent = '↩️';
    else if (inst.angle > 120) arrow.textContent = '↪️';
    else if (inst.angle > 60) arrow.textContent = '➡️';
    else if (inst.angle > 20) arrow.textContent = '↗️';
    else arrow.textContent = '⬆️';

    text.textContent = inst.direction;
    dist.textContent = inst.distance + 'm ahead';

    indicator.style.display = 'block';
    setTimeout(() => { indicator.style.display = 'none'; }, 3000);
  }

  // ================= Playback animation =================
  let animLen=0, animRAF=null, animStart=null, animElapsed=0, playing=false;
  const routeEl0 = document.getElementById('routePath');
  const routeDoneEl = document.getElementById('routePathDone');
  const playMarker = document.getElementById('playMarker');
  const playBtn = document.getElementById('playBtn');
  const progressBar = document.getElementById('progressBar');
  const speedSlider = document.getElementById('speedSlider');

  function setupAnim(pathEl){
    animLen = pathEl.getTotalLength();
    pathEl.style.strokeDasharray = animLen;
    pathEl.style.strokeDashoffset = animLen;
    animElapsed = 0;
    playing = false;
    playBtn.textContent = '▶';
    playMarker.style.display = 'block';
    const start = pathEl.getPointAtLength(0);
    playMarker.setAttribute('cx', start.x);
    playMarker.setAttribute('cy', start.y);
    progressBar.style.width = '0%';
    routeDoneEl.setAttribute('d', '');
    // Position location marker at start
    const locMarker = document.getElementById('locMarker');
    locMarker.setAttribute('cx', start.x);
    locMarker.setAttribute('cy', start.y);
    locMarker.style.display = 'block';
  }

  function pauseAnim(){
    playing = false;
    if (animRAF) cancelAnimationFrame(animRAF);
    playBtn.textContent = '▶';
  }

  function speedKmPerSec(){
    const v = parseInt(speedSlider.value,10);
    // 25x slower than before: 0.012 to ~0.24 km/s
    return 0.012 + (v-1) * 0.025;
  }

  function updateRouteDisplay(){
    const speed = speedKmPerSec()*1000;
    const dist = Math.min(animLen, animElapsed/1000*speed);
    routeEl0.style.strokeDashoffset = animLen - dist;

    // Build done path
    if (dist > 0 && currentCircuit){
      let doneD = '';
      const totalSteps = currentCircuit.length - 1;
      const currentStep = Math.floor((dist / animLen) * totalSteps);
      if (currentStep > 0){
        doneD = 'M'+px(currentCircuit[0]).toFixed(1)+','+py(currentCircuit[0]).toFixed(1)+' ';
        for (let i=1; i<=Math.min(currentStep+1, currentCircuit.length-1); i++){
          doneD += 'L'+px(currentCircuit[i]).toFixed(1)+','+py(currentCircuit[i]).toFixed(1)+' ';
        }
      }
      routeDoneEl.setAttribute('d', doneD);
    }

    const pt = routeEl0.getPointAtLength(dist);
    playMarker.setAttribute('cx', pt.x);
    playMarker.setAttribute('cy', pt.y);

    // Update location marker (blue dot)
    const locMarker = document.getElementById('locMarker');
    locMarker.setAttribute('cx', pt.x);
    locMarker.setAttribute('cy', pt.y);
    locMarker.style.display = 'block';
    progressBar.style.width = (dist/animLen*100)+'%';

    const totalSteps = currentCircuit ? currentCircuit.length - 1 : 1;
    const newStepIndex = Math.floor((dist / animLen) * totalSteps);
    if (newStepIndex !== currentStepIndex && newStepIndex < instructions.length){
      currentStepIndex = newStepIndex;
      updateInstructionHighlight();
      // Show turn indicator for significant turns
      if (instructions[currentStepIndex] && instructions[currentStepIndex].angle > 45){
        showTurnIndicator(instructions[currentStepIndex]);
      }
    }
  }

  function tick(ts){
    if (!playing) return;
    if (animStart===null) animStart = ts - animElapsed;
    animElapsed = ts - animStart;
    updateRouteDisplay();

    const speed = speedKmPerSec()*1000;
    const dist = animElapsed/1000*speed;
    if (dist >= animLen){
      playing = false;
      playBtn.textContent = '▶';
      currentStepIndex = instructions.length;
      updateInstructionHighlight();
      return;
    }
    animRAF = requestAnimationFrame(tick);
  }

  playBtn.onclick = function(){
    if (!currentCircuit) return;
    if (playing){
      pauseAnim();
    } else {
      if (parseFloat(routeEl0.style.strokeDashoffset||animLen) <= 0){
        animElapsed = 0;
        currentStepIndex = 0;
      }
      playing = true;
      animStart = null;
      playBtn.textContent = '❚❚';
      animRAF = requestAnimationFrame(tick);
    }
  };

  // ================= Export / Import =================
  document.getElementById('btnExport').onclick = exportRoute;
  document.getElementById('btnExportPanel').onclick = exportRoute;
  document.getElementById('btnImport').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = importRoute;

  function exportRoute(){
    if (!routeResult || !selection || startNode === null){
      statusEl.textContent = 'No route to export. Compute a route first.';
      return;
    }
    const exportData = {
      version: '1.0',
      timestamp: new Date().toISOString(),
      selection: {
        bbox: selection.bbox,
        nodeSet: Array.from(selection.nodeSet),
        edgeList: selection.edgeList
      },
      startNode: startNode,
      route: routeResult,
      instructions: instructions
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'oslo_route_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    statusEl.textContent = 'Route exported! Check your downloads.';
  }

  function importRoute(e){
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.selection || !data.route || data.startNode === undefined){
          throw new Error('Invalid route file format');
        }
        // Restore selection
        selection = {
          bbox: data.selection.bbox,
          nodeSet: new Set(data.selection.nodeSet),
          edgeList: data.selection.edgeList
        };
        startNode = data.startNode;
        paintedNodes = new Set(data.selection.nodeSet);

        // Restore visuals
        startMarkerEl.setAttribute('cx', px(startNode));
        startMarkerEl.setAttribute('cy', py(startNode));
        startMarkerEl.style.display = 'block';
        updatePaintDisplay();

        // Show route
        routeResult = data.route;
        instructions = data.instructions || [];
        currentCircuit = data.route.circuit;
        showResult(data.route);

        statusEl.textContent = 'Route imported! ' + data.route.stepCount + ' steps loaded. Tap Play or jump to any step.';
        btnStart.disabled = false;
        btnRun.disabled = false;
        btnInstructions.disabled = false;
      } catch (err){
        statusEl.textContent = 'Failed to import: ' + err.message;
      }
    };
    reader.readAsText(file);
  }

  // ================= Init =================
  loadData();
})();
</script>
</body>
</html>
