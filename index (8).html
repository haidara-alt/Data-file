<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oslo Postman Route Planner</title>
<style>
  :root{
    --ink:#14181a;
    --paper:#f6f3ec;
    --line:#10151a;
    --steel:#3b6e8f;
    --steel-soft:rgba(59,110,143,0.28);
    --paint:rgba(217,140,43,0.30);
    --paint-line:#c97c22;
    --erase-line:#b23b3b;
    --route:#e0562f;
    --start:#2fa84f;
    --amber:#d98c2b;
    --muted:#8a8f92;
    --gps:#2f8fe0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--ink);color:var(--paper);}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ---- Toolbar ---- */
  #toolbar{
    background:var(--ink);
    padding:10px 12px 8px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:20;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  #title{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--amber);
    font-weight:600;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  #title span{color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400;margin-left:8px;font-size:12px;}
  #buttons{display:flex;gap:6px;flex-wrap:wrap;}
  #buttons2{display:flex;gap:6px;flex-wrap:wrap;}
  button.tool{
    flex:1 1 auto;
    min-width:64px;
    background:#262d2c;
    color:var(--paper);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;
    padding:9px 6px;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  button.tool:active{transform:scale(0.96);}
  button.tool.active{background:var(--steel);border-color:var(--steel);}
  button.tool.active.eraseActive{background:var(--erase-line);border-color:var(--erase-line);}
  button.tool:disabled{opacity:0.35;cursor:not-allowed;}
  button.tool.danger{background:#3a1f1a;}
  button.tool.ghost{background:transparent;border-color:rgba(255,255,255,0.18);}
  #brushRow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
  #brushRow input[type=range]{flex:1;}
  #status{
    font-size:11.5px;
    color:var(--muted);
    min-height:15px;
    font-family:'SF Mono',ui-monospace,Menlo,monospace;
  }

  /* ---- Map ---- */
  #mapWrap{flex:1;position:relative;background:var(--paper);overflow:hidden;touch-action:none;}
  svg{width:100%;height:100%;display:block;}
  #basePath{fill:none;stroke:var(--line);stroke-width:2;stroke-linecap:round;opacity:0.68;}
  #paintPath{fill:none;stroke:var(--paint-line);stroke-width:7;stroke-linecap:round;stroke-linejoin:round;opacity:0.55;}
  #paintGlow circle{fill:var(--paint);}
  #dupPath{fill:none;stroke:var(--amber);stroke-width:4;stroke-linecap:round;opacity:0.95;}
  #routePath{fill:none;stroke:var(--route);stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round;}
  #brushCursor{fill:none;stroke:var(--steel);stroke-width:1.5;stroke-dasharray:4,3;pointer-events:none;display:none;}
  #startMarker{fill:var(--start);stroke:#0c3a19;stroke-width:1.4;display:none;}
  #playMarker{fill:var(--route);stroke:#fff;stroke-width:1.6;display:none;}
  #gpsMarker{fill:var(--gps);stroke:#fff;stroke-width:1.6;display:none;}
  #gpsHalo{fill:var(--gps);opacity:0.25;display:none;}

  @media (pointer:coarse){
    #basePath{stroke-width:2.6;}
    #routePath{stroke-width:7;}
    #dupPath{stroke-width:5;}
    #paintPath{stroke-width:9;}
  }

  #hint{
    position:absolute;left:10px;bottom:10px;
    background:rgba(20,24,26,0.9);color:var(--paper);
    padding:8px 11px;border-radius:8px;font-size:12px;line-height:1.4;
    max-width:70%;pointer-events:none;
  }
  #locBtn{
    position:absolute;right:10px;bottom:10px;
    background:rgba(20,24,26,0.9);color:var(--paper);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;
  }
  #locBtn.active{background:var(--gps);border-color:var(--gps);}

  /* ---- Results panel ---- */
  #panel{
    background:var(--ink);
    border-top:1px solid rgba(255,255,255,0.1);
    padding:0 14px;
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease, padding .25s ease;
    z-index:20;
    display:flex;
    flex-direction:column;
  }
  #panel.open{max-height:52vh;padding:12px 14px 14px;}
  #stats{
    display:flex;
    gap:12px;
    font-family:'SF Mono',ui-monospace,Menlo,monospace;
    font-size:11.5px;
    color:var(--paper);
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  #stats div b{display:block;color:var(--amber);font-size:15px;font-weight:700;}
  #stats div span{color:var(--muted);font-size:9.5px;letter-spacing:0.07em;text-transform:uppercase;}
  #playRow{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex:none;}
  #playBtn{
    background:var(--route);color:#fff;border:none;border-radius:50%;
    width:42px;height:42px;font-size:16px;cursor:pointer;flex:none;
    display:flex;align-items:center;justify-content:center;
  }
  #progressWrap{flex:1;height:6px;background:rgba(255,255,255,0.12);border-radius:4px;overflow:hidden;}
  #progressBar{height:100%;width:0%;background:var(--route);}
  #speedLabel{font-size:11px;color:var(--muted);white-space:nowrap;font-family:'SF Mono',ui-monospace,Menlo,monospace;}
  input[type=range]{width:64px;}
  #ioRow{display:flex;gap:6px;margin-bottom:8px;flex:none;}
  #ioRow button{flex:1;}
  #stepsHead{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;flex:none;}
  #steps{overflow-y:auto;flex:1;border-top:1px solid rgba(255,255,255,0.08);padding-top:6px;}
  .step{
    display:flex;gap:8px;align-items:flex-start;padding:7px 6px;border-radius:6px;cursor:pointer;font-size:12.5px;line-height:1.35;
  }
  .step:active{background:rgba(255,255,255,0.06);}
  .step.current{background:rgba(224,86,47,0.18);}
  .step .stepIcon{flex:none;width:22px;height:22px;border-radius:50%;background:#262d2c;color:var(--amber);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .step .stepText b{color:var(--paper);}
  .step .stepText small{display:block;color:var(--muted);font-size:10.5px;margin-top:1px;}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div id="title">OSLO POSTMAN ROUTE PLANNER <span>turn-aware route inspection</span>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
    <div id="buttons">
      <button class="tool active" id="btnPan">Pan/Zoom</button>
      <button class="tool" id="btnPaint">Paint District</button>
      <button class="tool" id="btnErase">Erase</button>
      <button class="tool" id="btnStart" disabled>Set Start</button>
      <button class="tool" id="btnRun" disabled>Run</button>
    </div>
    <div id="buttons2">
      <button class="tool ghost" id="btnExport" disabled>Export Route</button>
      <button class="tool ghost" id="btnImport">Import Route</button>
      <button class="tool danger" id="btnReset">Reset</button>
    </div>
    <div id="brushRow">
      <span>brush</span>
      <input type="range" id="brushSlider" min="12" max="140" value="35">
      <span id="brushVal">35 m</span>
    </div>
    <div id="status">Loading street data…</div>
  </div>

  <div id="mapWrap">
    <svg id="map" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
      <path id="basePath" d=""></path>
      <g id="paintGlow"></g>
      <path id="paintPath" d=""></path>
      <path id="dupPath" d=""></path>
      <circle id="brushCursor" r="0"></circle>
      <path id="routePath" d=""></path>
      <circle id="startMarker" r="5.5"></circle>
      <circle id="gpsHalo" r="10"></circle>
      <circle id="gpsMarker" r="5"></circle>
      <circle id="playMarker" r="6.5"></circle>
    </svg>
    <div id="hint">Paint a district over the streets you want covered.</div>
    <button id="locBtn">📍 My Location</button>
  </div>

  <div id="panel">
    <div id="stats">
      <div><b id="statSteps">–</b><span>steps</span></div>
      <div><b id="statDist">–</b><span>route km</span></div>
      <div><b id="statStreets">–</b><span>street km</span></div>
      <div><b id="statOverhead">–</b><span>overhead</span></div>
      <div><b id="statSharp">–</b><span>sharp turns</span></div>
      <div><b id="statU">–</b><span>u-turns</span></div>
    </div>
    <div id="playRow">
      <button id="playBtn">▶</button>
      <div id="progressWrap"><div id="progressBar"></div></div>
      <span id="speedLabel">speed</span>
      <input type="range" id="speedSlider" min="1" max="10" value="4">
    </div>
    <div id="stepsHead">Turn-by-turn (tap a step to start there)</div>
    <div id="steps"></div>
  </div>
</div>

<script>
(async function(){
  "use strict";

  // ================= Load data =================
  const raw = await (await fetch('oslo_data.json')).json();
  const nodes = raw.nodes;   // [lon, lat]
  const edges = raw.edges;   // [u, v, length, midGeom[[lon,lat],...]]
  const statusEl = document.getElementById('status');

  // ================= Projection =================
  let lonMin=Infinity, lonMax=-Infinity, latMin=Infinity, latMax=-Infinity;
  for (const n of nodes){
    if(n[0]<lonMin) lonMin=n[0];
    if(n[0]>lonMax) lonMax=n[0];
    if(n[1]<latMin) latMin=n[1];
    if(n[1]>latMax) latMax=n[1];
  }
  const latMid = (latMin+latMax)/2;
  const cosLat = Math.cos(latMid*Math.PI/180);
  const SCALE = 100000;
  function proj(lon,lat){
    return [ (lon-lonMin)*cosLat*SCALE, (latMax-lat)*SCALE ];
  }
  const projected = new Float64Array(nodes.length*2);
  for (let i=0;i<nodes.length;i++){
    const p = proj(nodes[i][0], nodes[i][1]);
    projected[i*2]=p[0]; projected[i*2+1]=p[1];
  }
  function px(i){ return projected[i*2]; }
  function py(i){ return projected[i*2+1]; }
  function unproj(x,y){
    return [ x/(cosLat*SCALE) + lonMin, latMax - y/SCALE ];
  }
  const nodesXY = new Array(nodes.length);
  for (let i=0;i<nodes.length;i++) nodesXY[i] = [px(i), py(i)];

  const worldW = (lonMax-lonMin)*cosLat*SCALE;
  const worldH = (latMax-latMin)*SCALE;

  // Pre-project every edge's geometry once, so both drawing and the worker
  // use the same flat coordinate space (world units ~ meters).
  const projEdges = edges.map(e=>{
    const mid = (e[3]||[]).map(m=>proj(m[0], m[1]));
    return [e[0], e[1], e[2], mid];
  });
  const lenMap = new Map();
  edges.forEach(e=>{ lenMap.set(e[0]+'_'+e[1], e[2]); lenMap.set(e[1]+'_'+e[0], e[2]); });

  // ================= Base map path =================
  const svg = document.getElementById('map');
  const basePathEl = document.getElementById('basePath');
  {
    let d = '';
    for (const e of projEdges){
      const [u,v,len,mid] = e;
      d += 'M'+px(u).toFixed(1)+','+py(u).toFixed(1)+' ';
      for (const m of mid){ d += 'L'+m[0].toFixed(1)+','+m[1].toFixed(1)+' '; }
      d += 'L'+px(v).toFixed(1)+','+py(v).toFixed(1)+' ';
    }
    basePathEl.setAttribute('d', d);
  }

  // ================= ViewBox / pan / zoom =================
  const pad = Math.max(worldW,worldH)*0.03;
  let vb = { x:-pad, y:-pad, w:worldW+2*pad, h:worldH+2*pad };
  function applyVB(){
    svg.setAttribute('viewBox', vb.x+' '+vb.y+' '+vb.w+' '+vb.h);
  }
  applyVB();

  function clientToSVG(clientX, clientY){
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const ctm = svg.getScreenCTM().inverse();
    const p = pt.matrixTransform(ctm);
    return {x:p.x, y:p.y};
  }

  // ================= Spatial grid (for fast brush painting) =================
  const GRID_CELL = 120;
  const grid = new Map();
  function cellsFor(x,y){ return Math.floor(x/GRID_CELL)+','+Math.floor(y/GRID_CELL); }
  projEdges.forEach((e,idx)=>{
    const pts = [[px(e[0]),py(e[0])], ...e[3], [px(e[1]),py(e[1])]];
    const cellSet = new Set();
    pts.forEach(([x,y])=>cellSet.add(cellsFor(x,y)));
    cellSet.forEach(k=>{
      if(!grid.has(k)) grid.set(k, []);
      grid.get(k).push(idx);
    });
  });
  function distPointSeg(px_,py_, ax,ay,bx,by){
    const dx=bx-ax, dy=by-ay;
    const len2 = dx*dx+dy*dy;
    let t = len2>0 ? ((px_-ax)*dx+(py_-ay)*dy)/len2 : 0;
    t = Math.max(0, Math.min(1, t));
    const cx=ax+t*dx, cy=ay+t*dy;
    return Math.hypot(px_-cx, py_-cy);
  }
  function edgeDistToPoint(idx, x, y){
    const e = projEdges[idx];
    const pts = [[px(e[0]),py(e[0])], ...e[3], [px(e[1]),py(e[1])]];
    let best = Infinity;
    for (let i=0;i<pts.length-1;i++){
      const d = distPointSeg(x,y, pts[i][0],pts[i][1], pts[i+1][0],pts[i+1][1]);
      if (d<best) best=d;
    }
    return best;
  }
  function edgesNear(x,y,radius){
    const cx0 = Math.floor((x-radius)/GRID_CELL), cx1 = Math.floor((x+radius)/GRID_CELL);
    const cy0 = Math.floor((y-radius)/GRID_CELL), cy1 = Math.floor((y+radius)/GRID_CELL);
    const seen = new Set();
    const out = [];
    for (let cx=cx0; cx<=cx1; cx++){
      for (let cy=cy0; cy<=cy1; cy++){
        const arr = grid.get(cx+','+cy);
        if (!arr) continue;
        for (const idx of arr){
          if (seen.has(idx)) continue;
          seen.add(idx);
          if (edgeDistToPoint(idx,x,y) <= radius) out.push(idx);
        }
      }
    }
    return out;
  }

  // ================= Mode / tool state =================
  let mode = 'pan'; // 'pan' | 'paint' | 'erase' | 'start'
  const btnPan = document.getElementById('btnPan');
  const btnPaint = document.getElementById('btnPaint');
  const btnErase = document.getElementById('btnErase');
  const btnStart = document.getElementById('btnStart');
  const btnRun = document.getElementById('btnRun');
  const btnReset = document.getElementById('btnReset');
  const btnExport = document.getElementById('btnExport');
  const btnImport = document.getElementById('btnImport');
  const importFile = document.getElementById('importFile');
  const hint = document.getElementById('hint');
  const brushSlider = document.getElementById('brushSlider');
  const brushVal = document.getElementById('brushVal');
  const brushCursor = document.getElementById('brushCursor');

  let brushRadius = parseFloat(brushSlider.value);
  brushSlider.oninput = function(){
    brushRadius = parseFloat(brushSlider.value);
    brushVal.textContent = brushRadius+' m';
    brushCursor.setAttribute('r', brushRadius);
  };
  brushCursor.setAttribute('r', brushRadius);

  function setMode(m){
    mode = m;
    [btnPan,btnPaint,btnErase,btnStart].forEach(b=>b.classList.remove('active','eraseActive'));
    if(m==='pan') btnPan.classList.add('active');
    if(m==='paint') btnPaint.classList.add('active');
    if(m==='erase'){ btnErase.classList.add('active'); btnErase.classList.add('eraseActive'); }
    if(m==='start') btnStart.classList.add('active');
    brushCursor.style.display = (m==='paint'||m==='erase') ? 'block' : 'none';
    if(m==='pan') hint.textContent = 'Drag to pan, scroll/pinch to zoom.';
    if(m==='paint') hint.textContent = 'Drag over streets to paint the district you want covered.';
    if(m==='erase') hint.textContent = 'Drag to erase streets from the painted district.';
    if(m==='start') hint.textContent = 'Tap the street corner you want to start (and end) at.';
  }
  btnPan.onclick = ()=>setMode('pan');
  btnPaint.onclick = ()=>setMode('paint');
  btnErase.onclick = ()=>setMode('erase');
  btnStart.onclick = ()=>{ if(!btnStart.disabled) setMode('start'); };

  // ---- wheel zoom ----
  document.getElementById('mapWrap').addEventListener('wheel', function(e){
    e.preventDefault();
    const p = clientToSVG(e.clientX, e.clientY);
    const factor = e.deltaY < 0 ? 0.88 : 1.14;
    const newW = vb.w*factor, newH = vb.h*factor;
    vb.x = p.x - (p.x - vb.x)*factor;
    vb.y = p.y - (p.y - vb.y)*factor;
    vb.w = newW; vb.h = newH;
    applyVB();
  }, {passive:false});

  // ================= Painted district selection =================
  const paintedEdgeIdx = new Set();
  const paintPathEl = document.getElementById('paintPath');
  const paintGlowEl = document.getElementById('paintGlow');
  let selection = null; // {edgeIdxList, edgeList(projected, for worker), nodeSet}

  function renderPaint(){
    let d = '';
    const nodeSet = new Set();
    for (const idx of paintedEdgeIdx){
      const e = projEdges[idx];
      d += 'M'+px(e[0]).toFixed(1)+','+py(e[0]).toFixed(1)+' ';
      for (const m of e[3]) d += 'L'+m[0].toFixed(1)+','+m[1].toFixed(1)+' ';
      d += 'L'+px(e[1]).toFixed(1)+','+py(e[1]).toFixed(1)+' ';
      nodeSet.add(e[0]); nodeSet.add(e[1]);
    }
    paintPathEl.setAttribute('d', d);
    // soft "filled district" wash under the roads, cities-skylines style
    let glow = '';
    nodeSet.forEach(n=>{
      glow += '<circle cx="'+px(n).toFixed(1)+'" cy="'+py(n).toFixed(1)+'" r="'+(brushRadius*1.15).toFixed(1)+'"></circle>';
    });
    paintGlowEl.innerHTML = glow;
    return nodeSet;
  }

  function finalizeSelection(){
    if (paintedEdgeIdx.size===0){ selection = null; btnStart.disabled = true; btnRun.disabled = true; return; }
    const nodeSet = renderPaint();
    const edgeIdxList = [...paintedEdgeIdx];
    const edgeList = edgeIdxList.map(i=>projEdges[i]);
    selection = { edgeIdxList, edgeList, nodeSet };
    statusEl.textContent = `Painted ${nodeSet.size} intersections, ${edgeIdxList.length} street segments.`;
    btnStart.disabled = false;
    resetRun();
  }

  let painting = false, paintDirty = false;
  function paintAt(x,y){
    const near = edgesNear(x,y,brushRadius);
    if (near.length===0) return;
    if (mode==='erase'){
      near.forEach(i=>paintedEdgeIdx.delete(i));
    } else {
      near.forEach(i=>paintedEdgeIdx.add(i));
    }
    paintDirty = true;
  }

  // ---- pointer drag: pan / paint / erase / set start ----
  let dragging=false, dragStartClient=null, dragStartVB=null;

  svg.addEventListener('pointerdown', function(e){
    svg.setPointerCapture(e.pointerId);
    dragging = true;
    dragStartClient = {x:e.clientX, y:e.clientY};
    dragStartVB = {...vb};
    if (mode==='paint' || mode==='erase'){
      painting = true;
      const p = clientToSVG(e.clientX, e.clientY);
      paintAt(p.x, p.y);
    }
  });

  svg.addEventListener('pointermove', function(e){
    if (mode==='paint' || mode==='erase'){
      const p = clientToSVG(e.clientX, e.clientY);
      brushCursor.setAttribute('cx', p.x);
      brushCursor.setAttribute('cy', p.y);
      brushCursor.setAttribute('stroke', mode==='erase' ? 'var(--erase-line)' : 'var(--paint-line)');
    }
    if(!dragging) return;
    if (mode==='pan'){
      const rect = svg.getBoundingClientRect();
      const scale = dragStartVB.w / rect.width;
      const dx = (e.clientX - dragStartClient.x) * scale;
      const dy = (e.clientY - dragStartClient.y) * scale;
      vb.x = dragStartVB.x - dx;
      vb.y = dragStartVB.y - dy;
      applyVB();
    } else if (painting){
      const p = clientToSVG(e.clientX, e.clientY);
      paintAt(p.x, p.y);
      if (paintDirty){ renderPaint(); paintDirty = false; }
    }
  });

  svg.addEventListener('pointerup', function(e){
    if (painting){
      painting = false;
      finalizeSelection();
    } else if (mode==='start' && dragging){
      const p = clientToSVG(e.clientX, e.clientY);
      pickStartNode(p.x, p.y);
    }
    dragging = false;
  });

  // ---- pinch zoom (two-finger touch) ----
  let pinchStartDist=null, pinchStartVB=null, pinchMid=null;
  document.getElementById('mapWrap').addEventListener('touchstart', function(e){
    if (e.touches.length===2){
      const [a,b] = e.touches;
      pinchStartDist = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
      pinchStartVB = {...vb};
      pinchMid = clientToSVG((a.clientX+b.clientX)/2, (a.clientY+b.clientY)/2);
      dragging = false; painting = false;
    }
  }, {passive:true});
  document.getElementById('mapWrap').addEventListener('touchmove', function(e){
    if (e.touches.length===2 && pinchStartDist){
      e.preventDefault();
      const [a,b] = e.touches;
      const dist = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
      const factor = pinchStartDist / dist;
      vb.w = pinchStartVB.w * factor;
      vb.h = pinchStartVB.h * factor;
      vb.x = pinchMid.x - (pinchMid.x - pinchStartVB.x) * factor;
      vb.y = pinchMid.y - (pinchMid.y - pinchStartVB.y) * factor;
      applyVB();
    }
  }, {passive:false});
  document.getElementById('mapWrap').addEventListener('touchend', function(e){
    if (e.touches.length<2) pinchStartDist=null;
  });

  // ================= Start point =================
  let startNode = null;
  const startMarkerEl = document.getElementById('startMarker');

  function pickStartNode(x,y){
    if (!selection) return;
    let best=null, bestD=Infinity;
    for (const i of selection.nodeSet){
      const dx = px(i)-x, dy = py(i)-y;
      const d = dx*dx+dy*dy;
      if (d<bestD){bestD=d; best=i;}
    }
    if (best===null) return;
    startNode = best;
    startMarkerEl.setAttribute('cx', px(best));
    startMarkerEl.setAttribute('cy', py(best));
    startMarkerEl.style.display = 'block';
    statusEl.textContent = 'Start point set. Ready to run.';
    btnRun.disabled = false;
  }

  // ================= Reset =================
  function resetRun(){
    document.getElementById('dupPath').setAttribute('d','');
    document.getElementById('routePath').setAttribute('d','');
    document.getElementById('playMarker').style.display='none';
    document.getElementById('panel').classList.remove('open');
    document.getElementById('steps').innerHTML = '';
    btnExport.disabled = true;
    pauseAnim();
    btnRun.disabled = !(selection && startNode!==null);
    lastResult = null;
  }
  btnReset.onclick = function(){
    paintedEdgeIdx.clear();
    renderPaint();
    selection = null; startNode = null;
    startMarkerEl.style.display='none';
    btnStart.disabled = true; btnRun.disabled = true;
    statusEl.textContent = 'Cleared. Paint a new district to begin.';
    resetRun();
    setMode('paint');
  };

  // ================= Worker (route computation) =================
  const workerCode = `
    class MinHeap{
      constructor(){this.arr=[];}
      push(item){
        this.arr.push(item);
        let i=this.arr.length-1;
        while(i>0){
          const p=(i-1)>>1;
          if(this.arr[p][0]<=this.arr[i][0])break;
          [this.arr[p],this.arr[i]]=[this.arr[i],this.arr[p]];
          i=p;
        }
      }
      pop(){
        const top=this.arr[0];
        const last=this.arr.pop();
        if(this.arr.length>0){
          this.arr[0]=last;
          let i=0;
          while(true){
            let l=2*i+1,r=2*i+2,s=i;
            if(l<this.arr.length&&this.arr[l][0]<this.arr[s][0])s=l;
            if(r<this.arr.length&&this.arr[r][0]<this.arr[s][0])s=r;
            if(s===i)break;
            [this.arr[s],this.arr[i]]=[this.arr[i],this.arr[s]];
            i=s;
          }
        }
        return top;
      }
      get size(){return this.arr.length;}
    }

    const TURN_WEIGHT = 30; // meters of penalty per radian of turn (bigger = avoids turns harder)

    function buildAdjPlain(n,edgeList){
      const adj=Array.from({length:n},()=>[]);
      edgeList.forEach((e)=>{
        const [u,v,length]=e;
        adj[u].push({to:v,length});
        adj[v].push({to:u,length});
      });
      return adj;
    }

    function bearingOf(p1,p2){ return Math.atan2(p2[1]-p1[1], p2[0]-p1[0]); }
    function normDiff(a,b){
      let d=b-a;
      while(d>Math.PI) d-=2*Math.PI;
      while(d<-Math.PI) d+=2*Math.PI;
      return Math.abs(d);
    }

    // Build a bearing-aware adjacency: for every directed traversal of an edge we know
    // the heading leaving the start node (outBearing) and the heading on arrival at the
    // end node (stored in arrivalBearing, keyed by edgeId_node so we can look up "what was
    // I heading when I arrived here via this edge").
    function buildAdjBearing(n, multiEdges, nodesXY){
      const adj = Array.from({length:n}, ()=>[]);
      const arrivalBearing = new Map();
      multiEdges.forEach((e, id)=>{
        const u=e[0], v=e[1], length=e[2], mid=e[3]||[];
        const ptsF = [nodesXY[u], ...mid, nodesXY[v]];
        const ptsR = ptsF.slice().reverse();
        const outF = bearingOf(ptsF[0], ptsF[1]);
        const inF  = bearingOf(ptsF[ptsF.length-2], ptsF[ptsF.length-1]);
        const outR = bearingOf(ptsR[0], ptsR[1]);
        const inR  = bearingOf(ptsR[ptsR.length-2], ptsR[ptsR.length-1]);
        adj[u].push({to:v, id, length, outBearing:outF});
        adj[v].push({to:u, id, length, outBearing:outR});
        arrivalBearing.set(id+'_'+v, inF);
        arrivalBearing.set(id+'_'+u, inR);
      });
      return {adj, arrivalBearing};
    }

    function dijkstraTurnAware(adj, arrivalBearing, source, validSet){
      const dist = new Map();
      const prevState = new Map();
      const startKey = source+'_-1';
      dist.set(startKey, 0);
      const heap = new MinHeap();
      heap.push([0, source, -1]);
      const visited = new Set();
      const bestArrival = new Map(); // node -> {cost,key}
      while(heap.size>0){
        const [cost, node, arrEdge] = heap.pop();
        const key = node+'_'+arrEdge;
        if(visited.has(key)) continue;
        visited.add(key);
        if(!bestArrival.has(node) || cost < bestArrival.get(node).cost){
          bestArrival.set(node, {cost, key});
        }
        const incoming = arrEdge===-1 ? null : arrivalBearing.get(arrEdge+'_'+node);
        for(const cand of adj[node]){
          if(validSet && !validSet.has(cand.to)) continue;
          const turnAngle = incoming===null ? 0 : normDiff(incoming, cand.outBearing);
          const newCost = cost + cand.length + TURN_WEIGHT*turnAngle;
          const newKey = cand.to+'_'+cand.id;
          if(!dist.has(newKey) || newCost < dist.get(newKey)){
            dist.set(newKey, newCost);
            prevState.set(newKey, key);
            heap.push([newCost, cand.to, cand.id]);
          }
        }
      }
      return {bestArrival, prevState, startKey};
    }
    function nodeOfKey(k){ return parseInt(k.split('_')[0],10); }
    function reconstructTurnAware(prevState, startKey, targetKey){
      const path=[];
      let cur = targetKey;
      while(true){
        path.push(nodeOfKey(cur));
        if(cur===startKey) break;
        cur = prevState.get(cur);
      }
      path.reverse();
      return path;
    }

    function greedyMatch(oddNodes, adjBearing, arrivalBearing, validSet){
      const remaining=new Set(oddNodes);
      const pairs=[];
      while(remaining.size>0){
        const m=remaining.values().next().value;
        remaining.delete(m);
        const {bestArrival, prevState, startKey} = dijkstraTurnAware(adjBearing, arrivalBearing, m, validSet);
        let bestN=null,bestD=Infinity;
        for(const n of remaining){
          const info = bestArrival.get(n);
          const d = info ? info.cost : Infinity;
          if(d<bestD){bestD=d;bestN=n;}
        }
        if(bestN===null)continue;
        remaining.delete(bestN);
        const info = bestArrival.get(bestN);
        pairs.push(reconstructTurnAware(prevState, startKey, info.key));
      }
      return pairs;
    }

    // Turn-aware Hierholzer: at every branch point we greedily continue in the
    // straightest available direction (smallest turn angle), which rewards long
    // uninterrupted segments, completes streets in one pass where possible, and
    // pushes sharp turns / U-turns toward the end only when unavoidable.
    function hierholzerTurnAware(nodeCount, multiEdges, start, nodesXY){
      const {adj, arrivalBearing} = buildAdjBearing(nodeCount, multiEdges, nodesXY);
      const used = new Array(multiEdges.length).fill(false);
      const stack = [{node:start, arrEdge:-1}];
      const circuit = [];
      while(stack.length>0){
        const top = stack[stack.length-1];
        const v = top.node;
        const candidates = adj[v].filter(c=>!used[c.id]);
        if(candidates.length===0){
          circuit.push(stack.pop().node);
          continue;
        }
        let chosen;
        if(top.arrEdge===-1){
          chosen = candidates.reduce((a,b)=> b.length>a.length ? b : a, candidates[0]);
        } else {
          const inBearing = arrivalBearing.get(top.arrEdge+'_'+v);
          let best=null, bestScore=Infinity;
          for(const c of candidates){
            const angle = normDiff(inBearing, c.outBearing);
            if(angle<bestScore){ bestScore=angle; best=c; }
          }
          chosen = best;
        }
        used[chosen.id]=true;
        stack.push({node:chosen.to, arrEdge:chosen.id});
      }
      circuit.reverse();
      return circuit;
    }

    function countTurns(circuit, nodesXY){
      let sharp=0, uturn=0;
      function bearing(a,b){ return Math.atan2(nodesXY[b][1]-nodesXY[a][1], nodesXY[b][0]-nodesXY[a][0]); }
      for(let i=2;i<circuit.length;i++){
        const b1=bearing(circuit[i-2],circuit[i-1]);
        const b2=bearing(circuit[i-1],circuit[i]);
        const d = normDiff(b1,b2)*180/Math.PI;
        if(d>=150) uturn++;
        else if(d>=90) sharp++;
      }
      return {sharp,uturn};
    }

    function largestComponent(nodesSet,adj,mustInclude){
      const visited=new Set();
      let best=null;
      for(const s of nodesSet){
        if(visited.has(s))continue;
        const comp=[]; const stack=[s]; visited.add(s);
        while(stack.length){
          const u=stack.pop(); comp.push(u);
          for(const {to} of adj[u]) if(nodesSet.has(to)&&!visited.has(to)){visited.add(to);stack.push(to);}
        }
        const compSet=new Set(comp);
        if(mustInclude!==undefined){
          if(compSet.has(mustInclude)) return compSet;
        } else if(!best||comp.length>best.length){ best=comp; }
      }
      return best?new Set(best):new Set();
    }

    self.onmessage = function(e){
      const {nodeCount, edgeList, startNode, nodesXY} = e.data;
      const nodeSet = new Set();
      edgeList.forEach(ed=>{nodeSet.add(ed[0]); nodeSet.add(ed[1]);});

      const adjFull = buildAdjPlain(nodeCount, edgeList);
      const compNodes = largestComponent(nodeSet, adjFull, startNode);
      if (!compNodes.has(startNode)){
        self.postMessage({error:'Start point is isolated from the painted streets. Pick another point.'});
        return;
      }
      const compEdges = edgeList.filter(ed=>compNodes.has(ed[0])&&compNodes.has(ed[1]));

      const degree = new Map();
      compEdges.forEach(ed=>{
        degree.set(ed[0],(degree.get(ed[0])||0)+1);
        degree.set(ed[1],(degree.get(ed[1])||0)+1);
      });
      let oddNodes = [...compNodes].filter(n=>(degree.get(n)||0)%2===1);

      const {adj:adjComp, arrivalBearing:arrComp} = buildAdjBearing(nodeCount, compEdges, nodesXY);

      let matchPool = oddNodes;
      if ((degree.get(startNode)||0)%2===1){
        matchPool = oddNodes.filter(n=>n!==startNode);
      }
      const pairs = greedyMatch(matchPool, adjComp, arrComp, compNodes);

      const geomMap = new Map();
      compEdges.forEach(ed=>{
        const [u,v,len,mid=[]] = ed;
        geomMap.set(u+'_'+v, mid);
        geomMap.set(v+'_'+u, mid.slice().reverse());
      });
      const lenMap = new Map();
      compEdges.forEach(ed=>{ lenMap.set(ed[0]+'_'+ed[1], ed[2]); lenMap.set(ed[1]+'_'+ed[0], ed[2]); });

      const multiEdges = compEdges.map(ed=>[ed[0],ed[1],ed[2], ed[3]||[]]);
      let addedLength=0;
      const dupSet = new Set(); // keys of edges that got duplicated (deadheaded)
      pairs.forEach(path=>{
        for(let i=0;i<path.length-1;i++){
          const a=path[i], b=path[i+1];
          const len=lenMap.get(a+'_'+b);
          const mid=geomMap.get(a+'_'+b)||[];
          multiEdges.push([a,b,len,mid]);
          addedLength+=len;
          dupSet.add(Math.min(a,b)+'_'+Math.max(a,b));
        }
      });

      const totalStreets = compEdges.reduce((s,ed)=>s+ed[2],0);
      const totalRoute = multiEdges.reduce((s,ed)=>s+ed[2],0);

      const circuit = hierholzerTurnAware(nodeCount, multiEdges, startNode, nodesXY);
      const turns = countTurns(circuit, nodesXY);

      self.postMessage({
        circuit, totalStreets, totalRoute, addedLength,
        stepCount: circuit.length-1,
        dupEdges: [...dupSet],
        sharpTurns: turns.sharp,
        uTurns: turns.uturn
      });
    };
  `;
  const workerBlob = new Blob([workerCode], {type:'application/javascript'});
  const worker = new Worker(URL.createObjectURL(workerBlob));

  btnRun.onclick = function(){
    if (!selection || startNode===null) return;
    statusEl.textContent = 'Computing turn-aware route… (large districts may take a few seconds)';
    btnRun.disabled = true;
    worker.postMessage({
      nodeCount: nodes.length,
      edgeList: selection.edgeList,
      startNode: startNode,
      nodesXY: nodesXY
    });
  };

  worker.onmessage = function(e){
    btnRun.disabled = false;
    const res = e.data;
    if (res.error){
      statusEl.textContent = res.error;
      return;
    }
    statusEl.textContent = 'Route ready.';
    showResult(res);
  };

  // ================= Turn-by-turn instruction generation (main thread) =================
  function segLenMeters(a,b){
    return lenMap.get(a+'_'+b) ?? Math.hypot(px(b)-px(a), py(b)-py(a));
  }
  function bearingNodes(a,b){ return Math.atan2(py(b)-py(a), px(b)-px(a)); }
  function angSignedDiff(a,b){
    let d=b-a;
    while(d>Math.PI) d-=2*Math.PI;
    while(d<-Math.PI) d+=2*Math.PI;
    return d;
  }
  function classifyTurn(deg, signed){
    if (deg>=150) return {kind:'uturn', label:'Turn around'};
    const dir = signed>0 ? 'right' : 'left';
    if (deg>=110) return {kind:'sharp', label:'Sharp turn '+dir};
    if (deg>=45) return {kind:'turn', label:'Turn '+dir};
    return {kind:'bear', label:'Bear '+dir};
  }
  function computeInstructions(circuit){
    const n = circuit.length;
    const cum = new Array(n).fill(0); // cumulative svg-space (px/py) distance, matches routePath length
    for (let i=1;i<n;i++){
      cum[i] = cum[i-1] + Math.hypot(px(circuit[i])-px(circuit[i-1]), py(circuit[i])-py(circuit[i-1]));
    }
    if (n<2) return {steps:[], cum};
    const steps = [];
    let curStart = 0;
    let curMeters = 0;
    let prevBearing = n>1 ? bearingNodes(circuit[0], circuit[1]) : 0;
    curMeters += segLenMeters(circuit[0], circuit[1]);
    for (let i=2;i<n;i++){
      const b = bearingNodes(circuit[i-1], circuit[i]);
      const signed = angSignedDiff(prevBearing, b);
      const deg = Math.abs(signed)*180/Math.PI;
      if (deg < 20){
        curMeters += segLenMeters(circuit[i-1], circuit[i]);
        prevBearing = b;
      } else {
        const info = classifyTurn(deg, signed);
        steps.push({fromIdx:curStart, toIdx:i-1, meters:curMeters, kind: steps.length===0?'start':info.kind, label: steps.length===0?'Head out':info.label});
        curStart = i-1;
        curMeters = segLenMeters(circuit[i-1], circuit[i]);
        prevBearing = b;
      }
    }
    steps.push({fromIdx:curStart, toIdx:n-1, meters:curMeters, kind:'arrive', label:'Continue to finish'});
    return {steps, cum};
  }

  // ================= Show result =================
  let currentCircuit = null;
  let currentCum = null;
  let currentSteps = null;
  let currentStepIndex = -1;
  let lastResult = null;
  const stepsEl = document.getElementById('steps');

  function iconFor(kind){
    if(kind==='start') return '▶';
    if(kind==='uturn') return '↩';
    if(kind==='sharp') return '⚠';
    if(kind==='turn') return '↱';
    if(kind==='bear') return '↗';
    if(kind==='arrive') return '⚑';
    return '•';
  }

  function renderSteps(){
    let html = '';
    currentSteps.forEach((s,i)=>{
      html += '<div class="step" data-i="'+i+'"><div class="stepIcon">'+iconFor(s.kind)+'</div>'+
        '<div class="stepText"><b>'+s.label+'</b><small>'+Math.round(s.meters)+' m</small></div></div>';
    });
    stepsEl.innerHTML = html;
    stepsEl.querySelectorAll('.step').forEach(el=>{
      el.addEventListener('click', ()=>{
        const i = parseInt(el.getAttribute('data-i'),10);
        jumpToStep(i);
      });
    });
  }
  function highlightStep(i){
    currentStepIndex = i;
    stepsEl.querySelectorAll('.step').forEach(el=>{
      el.classList.toggle('current', parseInt(el.getAttribute('data-i'),10)===i);
    });
    const active = stepsEl.querySelector('.step.current');
    if (active) active.scrollIntoView({block:'nearest'});
  }

  function showResult(res){
    currentCircuit = res.circuit;
    lastResult = res;
    btnExport.disabled = false;

    // draw duplicated (deadhead) edges in amber
    const dupSet = new Set(res.dupEdges);
    let dd = '';
    if (selection){
      for (const e of selection.edgeList){
        const key = Math.min(e[0],e[1])+'_'+Math.max(e[0],e[1]);
        if (dupSet.has(key)){
          dd += 'M'+px(e[0]).toFixed(1)+','+py(e[0]).toFixed(1)+' L'+px(e[1]).toFixed(1)+','+py(e[1]).toFixed(1)+' ';
        }
      }
    }
    document.getElementById('dupPath').setAttribute('d', dd);

    // build route path (for animation) - straight segments node to node
    let rd = 'M'+px(currentCircuit[0]).toFixed(1)+','+py(currentCircuit[0]).toFixed(1)+' ';
    for (let i=1;i<currentCircuit.length;i++){
      rd += 'L'+px(currentCircuit[i]).toFixed(1)+','+py(currentCircuit[i]).toFixed(1)+' ';
    }
    const routeEl = document.getElementById('routePath');
    routeEl.setAttribute('d', rd);

    document.getElementById('statSteps').textContent = res.stepCount;
    document.getElementById('statDist').textContent = (res.totalRoute/1000).toFixed(2);
    document.getElementById('statStreets').textContent = (res.totalStreets/1000).toFixed(2);
    document.getElementById('statOverhead').textContent = (res.addedLength/res.totalStreets*100).toFixed(0)+'%';
    document.getElementById('statSharp').textContent = res.sharpTurns;
    document.getElementById('statU').textContent = res.uTurns;
    document.getElementById('panel').classList.add('open');

    const inst = computeInstructions(currentCircuit);
    currentSteps = inst.steps;
    currentCum = inst.cum;
    renderSteps();
    highlightStep(-1);

    setupAnim(routeEl);
  }

  // ================= Playback animation =================
  let animLen=0, animRAF=null, animStart=null, animElapsed=0, playing=false;
  const routeEl0 = document.getElementById('routePath');
  const playMarker = document.getElementById('playMarker');
  const playBtn = document.getElementById('playBtn');
  const progressBar = document.getElementById('progressBar');
  const speedSlider = document.getElementById('speedSlider');

  function setupAnim(pathEl){
    animLen = pathEl.getTotalLength();
    renderAtDist(0);
    playing = false;
    playBtn.textContent = '▶';
  }

  function renderAtDist(dist){
    dist = Math.max(0, Math.min(animLen, dist));
    routeEl0.style.strokeDasharray = animLen;
    routeEl0.style.strokeDashoffset = animLen - dist;
    playMarker.style.display = 'block';
    const pt = routeEl0.getPointAtLength(dist);
    playMarker.setAttribute('cx', pt.x);
    playMarker.setAttribute('cy', pt.y);
    progressBar.style.width = (animLen>0 ? (dist/animLen*100) : 0)+'%';
    animElapsed = dist / (speedKmPerSec()*1000) * 1000;
    if (currentCum && currentSteps){
      // find which step contains this distance
      let idx = 0;
      for (let i=0;i<currentSteps.length;i++){
        if (currentCum[currentSteps[i].fromIdx] <= dist) idx = i;
      }
      highlightStep(idx);
    }
  }

  function pauseAnim(){
    playing = false;
    if (animRAF) cancelAnimationFrame(animRAF);
    playBtn.textContent = '▶';
  }

  function speedKmPerSec(){
    // slider 1-10 -> 0.3 to 6 "world units"/sec (route units are ~meters), for demo pacing
    const v = parseInt(speedSlider.value,10);
    return 0.3 + (v-1) * 0.63;
  }

  function tick(ts){
    if (!playing) return;
    if (animStart===null) animStart = ts - animElapsed;
    animElapsed = ts - animStart;
    const speed = speedKmPerSec()*1000;
    const dist = Math.min(animLen, animElapsed/1000*speed);
    routeEl0.style.strokeDashoffset = animLen - dist;
    const pt = routeEl0.getPointAtLength(dist);
    playMarker.setAttribute('cx', pt.x);
    playMarker.setAttribute('cy', pt.y);
    progressBar.style.width = (dist/animLen*100)+'%';
    if (currentCum && currentSteps){
      let idx = 0;
      for (let i=0;i<currentSteps.length;i++){
        if (currentCum[currentSteps[i].fromIdx] <= dist) idx = i;
      }
      if (idx !== currentStepIndex) highlightStep(idx);
    }
    if (dist >= animLen){
      playing = false;
      playBtn.textContent = '▶';
      return;
    }
    animRAF = requestAnimationFrame(tick);
  }

  playBtn.onclick = function(){
    if (!currentCircuit) return;
    if (playing){
      pauseAnim();
    } else {
      if (parseFloat(routeEl0.style.strokeDashoffset||animLen) <= 0){
        renderAtDist(0);
      }
      playing = true;
      animStart = null;
      playBtn.textContent = '❚❚';
      animRAF = requestAnimationFrame(tick);
    }
  };

  function jumpToStep(i){
    if (!currentSteps || !currentSteps[i] || !currentCum) return;
    pauseAnim();
    const startIdx = currentSteps[i].fromIdx;
    const dist = currentCum[startIdx];
    renderAtDist(dist);
    playing = true;
    animStart = null;
    playBtn.textContent = '❚❚';
    animRAF = requestAnimationFrame(tick);
  }

  // ================= Export / Import route =================
  btnExport.onclick = function(){
    if (!lastResult || !selection) return;
    const payload = {
      version: 1,
      createdAt: new Date().toISOString(),
      paintedEdgeIdx: selection.edgeIdxList,
      startNode: startNode,
      result: lastResult
    };
    const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'oslo-postman-route-'+Date.now()+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  btnImport.onclick = function(){ importFile.click(); };
  importFile.onchange = function(){
    const file = importFile.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(){
      try{
        const obj = JSON.parse(reader.result);
        paintedEdgeIdx.clear();
        (obj.paintedEdgeIdx||[]).forEach(i=>paintedEdgeIdx.add(i));
        finalizeSelection();
        startNode = obj.startNode;
        startMarkerEl.setAttribute('cx', px(startNode));
        startMarkerEl.setAttribute('cy', py(startNode));
        startMarkerEl.style.display = 'block';
        btnRun.disabled = false;
        showResult(obj.result);
        statusEl.textContent = 'Route imported.';
        setMode('pan');
      } catch(err){
        statusEl.textContent = 'Could not read that file: '+err.message;
      }
    };
    reader.readAsText(file);
    importFile.value = '';
  };

  // ================= GPS / live location =================
  const locBtn = document.getElementById('locBtn');
  const gpsMarker = document.getElementById('gpsMarker');
  const gpsHalo = document.getElementById('gpsHalo');
  let watchId = null;
  locBtn.onclick = function(){
    if (watchId!==null){
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
      gpsMarker.style.display='none';
      gpsHalo.style.display='none';
      locBtn.classList.remove('active');
      return;
    }
    if (!navigator.geolocation){
      statusEl.textContent = 'Geolocation is not available on this device/browser.';
      return;
    }
    locBtn.classList.add('active');
    let firstFix = true;
    watchId = navigator.geolocation.watchPosition(function(pos){
      const p = proj(pos.coords.longitude, pos.coords.latitude);
      gpsMarker.style.display='block';
      gpsHalo.style.display='block';
      gpsMarker.setAttribute('cx', p[0]); gpsMarker.setAttribute('cy', p[1]);
      gpsHalo.setAttribute('cx', p[0]); gpsHalo.setAttribute('cy', p[1]);
      if (firstFix){
        vb = { x:p[0]-vb.w/2, y:p[1]-vb.h/2, w:vb.w, h:vb.h };
        applyVB();
        firstFix = false;
      }
      // if a route is active, auto-advance the highlighted step to whichever
      // step's start node is nearest to the rider's real position.
      if (currentCircuit && currentCum){
        let bestI=0, bestD=Infinity;
        for (let i=0;i<currentCircuit.length;i++){
          const d = Math.hypot(px(currentCircuit[i])-p[0], py(currentCircuit[i])-p[1]);
          if (d<bestD){ bestD=d; bestI=i; }
        }
        if (bestD < brushRadius*3 && currentSteps){
          let idx=0;
          for (let i=0;i<currentSteps.length;i++){
            if (currentSteps[i].fromIdx <= bestI) idx = i;
          }
          highlightStep(idx);
        }
      }
    }, function(err){
      statusEl.textContent = 'Location error: '+err.message;
      locBtn.classList.remove('active');
      watchId = null;
    }, {enableHighAccuracy:true, maximumAge:2000});
  };

  statusEl.textContent = `Loaded ${nodes.length} intersections, ${edges.length} street segments across Oslo. Paint a district to begin.`;
  setMode('paint');
})();
</script>
</body>
</html>
